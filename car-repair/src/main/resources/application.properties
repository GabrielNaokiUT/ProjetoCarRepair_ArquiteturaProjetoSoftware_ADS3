spring.application.name=car-repair
server.port=9081
springdoc.api-docs.path=/api-docs
# Dados do banco
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/car-repair
##spring.datasource.password=874802c381d14d54b217c598f440072f
spring.datasource.password=12345678
spring.datasource.username=postgres
spring.http.codec.max-in-memory-size=50MB
# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

#Timezone
spring.jackson.time-zone=America/Sao_Paulo
spring.jpa.properties.hibernate.jdbc.time_zone=America/Sao_Paulo

#Jackson(serializa\u00e7\u00e3o do JSON)
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# CRUCIAL: define como o JPA cria/atualiza as tabelas
# 'update': cria se n\u00e3o existir, atualiza se mudar (recomendado para dev)
# 'create': cria do zero a cada execu\u00e7\u00e3o (apaga dados)
spring.jpa.hibernate.ddl-auto=update

# Opcional: mostra o SQL no console
spring.jpa.show-sql=true
